version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: feedvote-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-feedvote}
      MYSQL_USER: ${MYSQL_USER:-feedvote}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-feedvote_secure}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - feedvote-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 30s

  backend:
    build: ./backend
    container_name: feedvote-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER:-feedvote}:${MYSQL_PASSWORD:-feedvote_secure}@db:3306/${MYSQL_DATABASE:-feedvote}"
    ports:
      - "8000:8000"
    networks:
      - feedvote-network
    restart: unless-stopped
    # No volume mounts in production (read-only from image)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  frontend:
    build: ./frontend
    container_name: feedvote-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"
    networks:
      - feedvote-network
    restart: unless-stopped
    # No volume mounts in production
    healthcheck:
      test: 
        - CMD
        - bash
        - -c
        - "test -f /tmp/frontend-ready && curl -sf http://localhost:8501/ > /dev/null"
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

volumes:
  mysql_data:
    driver: local

networks:
  feedvote-network:
    driver: bridge
