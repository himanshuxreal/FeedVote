version: "3.9"

services:
  backend:
    build: ./backend
    container_name: feedvote-backend
    environment:
      DATABASE_URL: "sqlite:///./feedvote.db"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - feedvote-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: feedvote-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    networks:
      - feedvote-network
    restart: unless-stopped

networks:
  feedvote-network:
    driver: bridge
